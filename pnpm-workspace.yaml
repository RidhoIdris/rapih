packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  dtrace-provider: true
  esbuild: true
  prisma: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@expo/eas-build-job@18.13.1'
  - '@expo/eas-json@18.13.1'
  - '@expo/steps@18.13.1'
  - eas-cli@18.13.1
